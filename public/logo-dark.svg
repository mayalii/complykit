<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 80" fill="none">
  <!-- Icon: Shield with checkmark + brand lines -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c93e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0074c7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#36adf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0c93e9;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Shield shape -->
  <path d="M40 6 L68 18 L68 40 C68 56 56 68 40 74 C24 68 12 56 12 40 L12 18 Z" fill="url(#grad1)" rx="4"/>

  <!-- Checkmark inside shield -->
  <polyline points="26,40 36,50 54,30" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Brand consistency lines (right side of shield) -->
  <rect x="56" y="28" width="8" height="2.5" rx="1.25" fill="white" opacity="0.5"/>
  <rect x="56" y="34" width="6" height="2.5" rx="1.25" fill="white" opacity="0.35"/>

  <!-- Text: ComplyKit -->
  <text x="86" y="52" font-family="Inter, 'IBM Plex Sans Arabic', sans-serif" font-size="34" font-weight="700" fill="white" letter-spacing="-0.5">
    <tspan fill="white">Comply</tspan><tspan fill="#36adf8">Kit</tspan>
  </text>
</svg>
